# This file was generated using Kotlin DSL (.github/workflows/release.main.kts).
# If you want to modify the workflow, please change the Kotlin file and regenerate this YAML file.
# Generated with https://github.com/typesafegithub/github-workflows-kt

name: 'Release'
on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        type: 'choice'
        required: true
        options:
        - 'major'
        - 'minor'
        - 'patch'
      changelog:
        description: 'Changelog for this release (use \n for new lines)'
        type: 'string'
        required: true
jobs:
  check_yaml_consistency:
    name: 'Check YAML consistency'
    runs-on: 'ubuntu-latest'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Execute script'
      run: 'rm ''.github/workflows/release.yaml'' && ''.github/workflows/release.main.kts'''
    - id: 'step-2'
      name: 'Consistency check'
      run: 'git diff --exit-code ''.github/workflows/release.yaml'''
  release:
    runs-on: 'ubuntu-latest'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Set up Git identity'
      run: |-
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    - id: 'step-1'
      name: 'Checkout'
      uses: 'actions/checkout@v4'
      with:
        ssh-key: '${{ secrets.RELEASE_KEY }}'
    - id: 'step-2'
      name: 'Set up JDK 21'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '21'
        distribution: 'temurin'
    - id: 'step-3'
      name: 'Set up Gradle'
      uses: 'gradle/actions/setup-gradle@v4'
    - id: 'step-4'
      name: 'Reveal secrets'
      uses: 'entrostat/git-secret-action@v4'
      with:
        gpg-private-key: '${{ secrets.GPG_KEY }}'
    - id: 'step-5'
      name: 'Bump version and push tag'
      run: './app/bump_version.sh "${{ github.event.inputs.version_type }}" "${{ github.event.inputs.changelog }}"'
    - id: 'step-6'
      name: 'Build GitHub release APK'
      run: './gradlew assembleGithubRelease'
    - id: 'step-7'
      name: 'Create GitHub release'
      uses: 'softprops/action-gh-release@v2'
      with:
        name: '${{ steps.step-5.outputs.version }}'
        tag_name: '${{ steps.step-5.outputs.version }}'
        draft: 'false'
        files: |-
          app/build/outputs/apk/github/release/app-github-release.apk
          app/build/outputs/mapping/githubRelease/mapping.txt
    - id: 'step-8'
      name: 'Build Play Store bundle'
      run: './gradlew bundlePlaystoreRelease'
    - id: 'step-9'
      name: 'Set up Ruby'
      uses: 'ruby/setup-ruby@v1'
      with:
        ruby-version: '3.4.10'
        bundler-cache: 'true'
        working-directory: 'fastlane'
    - id: 'step-10'
      name: 'Publish to Google Play'
      env:
        BUNDLE_GEMFILE: 'fastlane/Gemfile'
      run: 'bundle exec fastlane playstore'

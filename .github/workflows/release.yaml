name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version bump'
        type: choice
        required: true
        options:
          - major
          - minor
          - patch
      changelog:
        description: 'Changelog for this release (use \n for new lines)'
        type: string
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Checkout with a deploy key so the version-bump commit and tag can be pushed back.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.RELEASE_KEY }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Decrypts app/keystore, app/keystore.properties and fastlane/google-play.json (git-secret).
      - name: Reveal secrets
        uses: entrostat/git-secret-action@v4
        with:
          gpg-private-key: ${{ secrets.GPG_KEY }}

      - name: Bump version and push tag
        id: bump
        run: ./app/bump_version.sh "${{ github.event.inputs.version_type }}" "${{ github.event.inputs.changelog }}"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.bump.outputs.version }}
          tag_name: ${{ steps.bump.outputs.version }}
          draft: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/mapping/release/mapping.txt

      - name: Build Play Store bundle
        run: ./gradlew bundleRelease

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: fastlane

      - name: Publish to Google Play
        run: bundle exec fastlane playstore
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile

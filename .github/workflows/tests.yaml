name: 'Unit Tests'
on:
  push: {}
  pull_request: {}
jobs:
  check_yaml_consistency:
    name: 'Check YAML consistency'
    runs-on: 'ubuntu-latest'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Execute script'
      run: 'rm ''.github/workflows/tests.yaml'' && ''.github/workflows/tests.main.kts'''
    - id: 'step-2'
      name: 'Consistency check'
      run: 'git diff --exit-code ''.github/workflows/tests.yaml'''
  test:
    runs-on: 'ubuntu-latest'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Checkout'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Set up JDK 21'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '21'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'Set up Gradle'
      uses: 'gradle/actions/setup-gradle@v4'
    - id: 'step-3'
      name: 'Run unit tests'
      run: './gradlew testDebugUnitTest'
    - id: 'step-4'
      name: 'Upload test reports on failure'
      uses: 'actions/upload-artifact@v4'
      with:
        name: 'unit-test-reports'
        path: |-
          app/build/reports/tests
          app/build/test-results
      if: 'failure()'
